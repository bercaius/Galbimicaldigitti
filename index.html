<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>imkansizdiyebiseyyoh</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.js 3D Engine CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- Yıldızlı Uzay Arkaplan Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Fullscreen 3D Dokulu Kalp Canvas Container -->
    <div id="three-container"></div>

    <!-- Gizli Minimal Ses Kontrol Düğmesi -->
    <button id="btn-sound" class="sound-btn" aria-label="Sesi Aç/Kapat" title="Sesi Aç / Kapat">
        <svg id="sound-on-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
        <svg id="sound-off-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="23" y1="9" x2="17" y2="15"></line>
            <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
    </button>

    <!-- Repodaki music.mp3 Ses Dosyası -->
    <audio id="bg-music" src="music.mp3" loop preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
